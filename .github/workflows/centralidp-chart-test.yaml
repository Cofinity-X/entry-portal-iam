name: CentralIdP Lint and Test Chart

on: 
  push:
    paths:
      - 'charts/centralidp/**'
      - 'import/**'
    branches: [ main ]
  pull_request:
    paths:
      - 'charts/centralidp/**'
      - 'import/**'
  workflow_dispatch:
    inputs:
      node_image:
        description: 'kindest/node image for k8s kind cluster'
        # k8s version to support
        default: 'kindest/node:v1.27.3'
        required: false
        type: string
      upgrade_from:
        description: 'portal chart version to upgrade from'
        # centralidp version from 24.03 release
        default: '2.1.0'
        required: false
        type: string

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Kubernetes KinD Cluster
        uses: container-tools/kind-action@0ad70e2299366b0e1552c7240f4e4567148f723e # v2.0.4
        with:
          version: v0.19.0
          node_image: ${{ github.event.inputs.node_image || 'kindest/node:v1.27.3' }}

      - name: Build init container image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .
          file: docker/Dockerfile.import
          push: true
          tags: kind-registry:5000/iam:testing

      - name: Set up Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4
        with:
          version: v3.10.3

      # Setup python as a prerequisite for chart linting 
      - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55 # v5.5.0
        with:
          python-version: '3.9'
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@0d28d3144d3a25ea2cc349d6e59901c4ff469b3b # v2.7.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # run chart linting
      - name: Run chart-testing (lint)
        run: ct lint --charts charts/centralidp --config charts/chart-testing-config.yaml

      # define charts to test with the --charts parameter
      - name: Run chart-testing (install)
        run: |
          echo "Installing centralidp chart..."
          if ! helm install centralidp charts/centralidp -f charts/values-test-centralidp.yaml --namespace install --create-namespace --debug --wait --timeout=10m; then
            echo "::error::Chart installation failed"
            echo "Gathering diagnostic information..."

            # Check pod status
            echo "Pod Status:"
            kubectl get pods -n install -o wide || true

            # Check events
            echo "Namespace Events:"
            kubectl get events -n install --sort-by='.lastTimestamp' || true

            # Get logs from failed pods
            echo "Pod Logs:"
            for pod in $(kubectl get pods -n install --no-headers -o custom-columns=":metadata.name" | grep -v Running || true); do
              echo "=== Logs for pod: $pod ==="
              kubectl logs $pod -n install --all-containers=true --previous=true || true
              kubectl logs $pod -n install --all-containers=true || true
              echo "=== Describe pod: $pod ==="
              kubectl describe pod $pod -n install || true
            done

            exit 1
          fi
          echo "Chart installation successful"
        if: github.event_name != 'pull_request' || steps.list-changed.outputs.changed == 'true'

        # Upgrade the released centralidp chart version with the locally available chart
      - name: Run helm upgrade
        run: |
          echo "Starting helm upgrade test..."
          helm repo add bitnami-full-index https://raw.githubusercontent.com/bitnami/charts/archive-full-index/bitnami
          helm repo add tractusx-dev https://eclipse-tractusx.github.io/charts/dev
          helm repo update

          echo "Installing base version ${{ github.event.inputs.upgrade_from || '2.1.0' }}..."
          if ! helm install centralidp tractusx-dev/centralidp -f charts/values-test-upgrade.yaml --version ${{ github.event.inputs.upgrade_from || '2.1.0' }} --namespace upgrade --create-namespace --debug --wait --timeout=10m; then
            echo "::error::Base version installation failed"
            echo "Gathering diagnostic information for base installation..."

            # Check pod status
            echo "Pod Status:"
            kubectl get pods -n upgrade -o wide || true

            # Check events
            echo "Namespace Events:"
            kubectl get events -n upgrade --sort-by='.lastTimestamp' || true

            # Get logs from failed pods
            echo "Pod Logs:"
            for pod in $(kubectl get pods -n upgrade --no-headers -o custom-columns=":metadata.name" 2>/dev/null || true); do
              echo "=== Logs for pod: $pod ==="
              kubectl logs $pod -n upgrade --all-containers=true --previous=true 2>/dev/null || true
              kubectl logs $pod -n upgrade --all-containers=true 2>/dev/null || true
              echo "=== Describe pod: $pod ==="
              kubectl describe pod $pod -n upgrade || true
            done

            exit 1
          fi

          echo "Base version installed successfully"
          helm dependency update charts/centralidp

          echo "Attempting upgrade..."
          # First attempt upgrade without force
          if ! helm upgrade centralidp charts/centralidp -f charts/values-test-upgrade.yaml --namespace upgrade --debug --wait --timeout=10m --atomic; then
            echo "::warning::Initial upgrade failed, attempting with --force flag"
            echo "Gathering diagnostic information before retry..."

            # Check current state
            echo "Current Pod Status:"
            kubectl get pods -n upgrade -o wide || true

            echo "Recent Events:"
            kubectl get events -n upgrade --sort-by='.lastTimestamp' | tail -20 || true

            # Get logs from problematic pods
            echo "Current Pod Logs:"
            for pod in $(kubectl get pods -n upgrade --no-headers -o custom-columns=":metadata.name" 2>/dev/null || true); do
              if [[ $(kubectl get pod $pod -n upgrade -o jsonpath='{.status.phase}' 2>/dev/null) != "Running" ]]; then
                echo "=== Logs for non-running pod: $pod ==="
                kubectl logs $pod -n upgrade --all-containers=true --previous=true 2>/dev/null || true
                kubectl logs $pod -n upgrade --all-containers=true 2>/dev/null || true
                kubectl describe pod $pod -n upgrade || true
              fi
            done

            echo "Retrying with --force flag..."
            # Retry with force flag if first attempt fails
            if ! helm upgrade centralidp charts/centralidp -f charts/values-test-upgrade.yaml --namespace upgrade --debug --wait --timeout=10m --atomic --force; then
              echo "::error::Upgrade failed even with --force flag"
              echo "Final diagnostic information..."

              # Comprehensive diagnostics for complete failure
              echo "Final Pod Status:"
              kubectl get pods -n upgrade -o wide || true

              echo "All Events:"
              kubectl get events -n upgrade --sort-by='.lastTimestamp' || true

              echo "StatefulSet Status:"
              kubectl get statefulset -n upgrade -o wide || true
              kubectl describe statefulset -n upgrade || true

              echo "Service Status:"
              kubectl get svc -n upgrade -o wide || true

              echo "PVC Status:"
              kubectl get pvc -n upgrade -o wide || true

              echo "All Pod Logs:"
              for pod in $(kubectl get pods -n upgrade --no-headers -o custom-columns=":metadata.name" 2>/dev/null || true); do
                echo "=== Complete logs for pod: $pod ==="
                kubectl logs $pod -n upgrade --all-containers=true --previous=true 2>/dev/null || true
                kubectl logs $pod -n upgrade --all-containers=true 2>/dev/null || true
                echo "=== Complete describe for pod: $pod ==="
                kubectl describe pod $pod -n upgrade || true
                echo "=========================="
              done

              # Check for common issues
              echo "Checking for common issues..."
              kubectl get events -n upgrade --field-selector type=Warning || true

              echo "Both normal and forced upgrade attempts failed"
              exit 1
            else
              echo "::notice::Upgrade succeeded with --force flag"
              echo "Final verification..."
              kubectl get pods -n upgrade -o wide
              echo "Upgrade completed successfully using --force flag"
            fi
          else
            echo "::notice::Upgrade succeeded without force"
            echo "Final verification..."
            kubectl get pods -n upgrade -o wide
            echo "Upgrade completed successfully without --force flag"
          fi
        if: github.event_name != 'pull_request' || steps.list-changed.outputs.changed == 'true'

      # Post-upgrade verification
      - name: Verify upgrade success
        run: |
          echo "Verifying upgrade success..."

          # Wait for pods to be ready
          echo "Waiting for pods to be ready..."
          kubectl wait --for=condition=Ready pods --all -n upgrade --timeout=300s || true

          # Check final status
          echo "Final Pod Status:"
          kubectl get pods -n upgrade -o wide

          # Check Helm release status
          echo "Helm Release Status:"
          helm status centralidp -n upgrade

          # Test basic connectivity if possible
          echo "Testing basic service connectivity..."
          kubectl get svc -n upgrade

          # Check for any remaining issues
          echo "Checking for any warnings or errors..."
          kubectl get events -n upgrade --field-selector type=Warning | tail -10 || true

          echo "Verification completed"
        if: github.event_name != 'pull_request' || steps.list-changed.outputs.changed == 'true'
